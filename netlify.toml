[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Force-redirect legacy category URLs to home (category feature removed from UI)
[[redirects]]
  from = "/category/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404
